<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<style>
  html,body{margin:0}
  body{background:#fff;padding:18px 22px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:10px}
  .mono{font-family:monospace;font-size:11px;color:var(--il-slate)}
  .r{display:flex;align-items:baseline;gap:12px;margin-bottom:5px}
</style></head>
<body>
<div class="lbl">Type scale</div>
<div class="r"><span style="font-size:40px;font-weight:800">Hero band</span><span class="mono">40 / 800</span></div>
<div class="r"><span style="font-size:32px;font-weight:800">Lead statement</span><span class="mono">32 / 800</span></div>
<div class="r"><span style="font-size:22px;font-weight:800">Page title</span><span class="mono">22 / 800 navy</span></div>
<div class="r"><span style="font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--il-slate)">Nav / label</span><span class="mono">15 / 600 upper</span></div>
<div class="r"><span style="font-size:16px">Body text</span><span class="mono">16 / 400</span></div>
<div class="r"><span style="font-size:13px;font-variant-numeric:tabular-nums">Grid cell 1,234</span><span class="mono">13 / tabular</span></div>
</body></html>
