<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  html,body{margin:0}
  body{background:#fff;padding:18px 20px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:12px}
  .kpi{flex:1;background:#fff;border:1px solid var(--il-border);border-top:3px solid var(--il-red);border-radius:4px;text-align:center;padding:20px 12px;box-shadow:var(--il-shadow)}
  .num{font-size:32px;font-weight:800;margin:8px 0 2px;color:var(--il-navy);font-variant-numeric:tabular-nums}
  .cap{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--il-slate)}
</style></head>
<body>
<div class="lbl">KPI cards · Illinois style</div>
<div style="display:flex;gap:14px">
  <div class="kpi"><i class="bi bi-telephone-fill" style="font-size:30px;color:var(--il-red)"></i><div class="num">128,540</div><div class="cap">Total Contacts</div></div>
  <div class="kpi"><i class="bi bi-people-fill" style="font-size:30px;color:var(--il-red)"></i><div class="num">41,209</div><div class="cap">Unique Contacts</div></div>
  <div class="kpi"><i class="bi bi-calendar-event-fill" style="font-size:30px;color:var(--il-red)"></i><div class="num">3,872</div><div class="cap">Total Events</div></div>
</div>
</body></html>
