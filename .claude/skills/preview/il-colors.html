<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<style>
  html,body{margin:0}
  body{background:var(--il-white);padding:20px 24px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:12px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .sw{width:104px}
  .chip{height:54px;border-radius:4px;border:1px solid var(--il-border)}
  .nm{font-size:12px;font-weight:700;margin-top:6px}
  .hx{font-family:monospace;font-size:11px;color:var(--il-slate)}
</style></head>
<body>
<div class="lbl">Surus Illinois · marketing palette</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:#C1272D"></div><div class="nm">Brand red</div><div class="hx">#C1272D</div></div>
  <div class="sw"><div class="chip" style="background:#2A313C"></div><div class="nm">Heading navy</div><div class="hx">#2A313C</div></div>
  <div class="sw"><div class="chip" style="background:#75859E"></div><div class="nm">Slate nav</div><div class="hx">#75859E</div></div>
  <div class="sw"><div class="chip" style="background:#EEF0F3"></div><div class="nm">Gray band</div><div class="hx">#EEF0F3</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="nm">White</div><div class="hx">#FFFFFF</div></div>
</div>
</body></html>
