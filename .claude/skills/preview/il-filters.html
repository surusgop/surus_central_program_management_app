<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<style>
  html,body{margin:0}
  body{background:#fff;padding:18px 20px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:12px}
  .flbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--il-navy);margin-bottom:5px;display:block}
  .ctrl{background:#fff;border:1px solid var(--il-border);border-radius:4px;padding:9px 11px;font-size:14px;color:var(--il-slate)}
  .chip{background:var(--il-gray-band);color:var(--il-navy);border-radius:3px;padding:2px 8px;font-size:13px;font-weight:600}
</style></head>
<body>
<div class="lbl">Filters · multi-select dropdowns</div>
<div style="display:flex;gap:14px">
  <div style="flex:1"><span class="flbl">State</span><div class="ctrl" style="display:flex;justify-content:space-between">All states…<span>▾</span></div></div>
  <div style="flex:1"><span class="flbl">Nation</span><div class="ctrl" style="display:flex;gap:5px;flex-wrap:wrap;padding:6px"><span class="chip">Cherokee ×</span><span class="chip">Navajo ×</span></div></div>
  <div style="flex:1"><span class="flbl">Date Range</span><div class="ctrl" style="color:var(--il-navy)">Jan 1, 2025 → Mar 31, 2025</div></div>
</div>
</body></html>
