<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<style>
  html,body{margin:0}
  body{background:#fff;padding:18px 20px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:12px}
</style></head>
<body>
<div class="lbl">Chart card · donut (Contact Type Breakdown)</div>
<div style="background:#fff;border:1px solid var(--il-border);border-radius:4px;overflow:hidden;max-width:360px;box-shadow:var(--il-shadow)">
  <div style="padding:11px 16px;border-bottom:2px solid var(--il-red);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--il-navy)">Contact Type Breakdown</div>
  <div style="padding:16px;display:flex;align-items:center;gap:18px">
    <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(#C1272D 0 34%,#2A313C 34% 56%,#75859E 56% 73%,#E07A2F 73% 86%,#A11F24 86% 100%);-webkit-mask:radial-gradient(circle 33px at center,transparent 98%,#000 100%);mask:radial-gradient(circle 33px at center,transparent 98%,#000 100%)"></div>
    <div style="display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:600">
      <span><span style="display:inline-block;width:10px;height:10px;background:#C1272D;border-radius:2px"></span> Door Knock</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#2A313C;border-radius:2px"></span> Phone</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#75859E;border-radius:2px"></span> Text</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#E07A2F;border-radius:2px"></span> Email</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#A11F24;border-radius:2px"></span> Other</span>
    </div>
  </div>
</div>
</body></html>
