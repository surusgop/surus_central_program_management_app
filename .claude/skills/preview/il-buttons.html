<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<style>
  html,body{margin:0}
  body{background:#fff;padding:22px 24px;font-family:var(--il-font);color:var(--il-navy)}
  .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--il-slate);font-weight:700;margin-bottom:14px}
  .btn{border:none;border-radius:4px;color:#fff;background:var(--il-red);padding:12px 22px;font:700 14px var(--il-font);cursor:pointer;line-height:1.2}
  .out{background:#fff;color:var(--il-red);border:2px solid var(--il-red)}
  .mono{font-family:monospace;font-size:11px;color:var(--il-slate);display:block;margin-top:16px}
</style></head>
<body>
<div class="lbl">Buttons</div>
<div style="display:flex;align-items:center;gap:14px">
  <button class="btn">Reach Out to<br>Learn More</button>
  <button class="btn" style="padding:12px 22px">Join the Battle Program</button>
  <button class="btn" style="background:var(--il-red-dark)">Hover</button>
  <button class="btn out">Secondary</button>
</div>
<span class="mono">Solid red #C1272D, white bold label, 4px radius · hover darkens to #A11F24.</span>
</body></html>
