<!-- @dsCard group="Components" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../themes/surus-illinois.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--il-font);color:var(--il-navy)}
  .bc{background:var(--il-gray-band);display:flex;align-items:center;justify-content:space-between;padding:14px 22px;font-size:14px}
  .bc a{font-weight:700;text-transform:uppercase;letter-spacing:.03em;text-decoration:none}
  .red{color:var(--il-red)} .gray{color:var(--il-slate)}
  .share{display:flex;align-items:center;gap:10px;color:var(--il-slate);font-weight:700;letter-spacing:.06em;font-size:13px}
  .ic{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px}
  .pad{padding:14px 22px;font-family:monospace;font-size:11px;color:var(--il-slate)}
</style></head>
<body>
<div class="bc">
  <span><a class="red">Home</a> <span class="gray">/</span> <a class="red">What We Do</a> <span class="gray">/</span> <a class="gray">Campaigns</a></span>
  <span class="share">SHARE
    <span class="ic" style="background:var(--il-fb)"><i class="bi bi-facebook"></i></span>
    <span class="ic" style="background:var(--il-tw)"><i class="bi bi-twitter"></i></span>
    <span class="ic" style="background:var(--il-red)"><i class="bi bi-envelope-fill"></i></span>
  </span>
</div>
<div class="pad">Breadcrumb strip on #EEF0F3 · active crumbs red, current gray · share icons fb/tw/email.</div>
</body></html>
