<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surus Central Program Management — UI Kit</title>

<!-- Bootstrap 5 grid/utilities (framework only; all theming overridden below) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/flatly/bootstrap.min.css">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<!-- Surus Illinois brand re-skin (loaded last to win the cascade) -->
<link rel="stylesheet" href="il-theme.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>

<style>
  .ag-mock tbody tr:hover td { background:#FBE9EA !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(false);
  const [route, setRoute]   = useState("/");
  const [f, setF] = useState({states:[],nations:[],groups:[],range:"",start:null,end:null});

  if (!authed) return <LoginPage onLogin={()=>{setAuthed(true);setRoute("/");}} />;

  return (
    <div>
      <Navbar active={route} onNav={setRoute}
              userEmail="analyst@surusenterprises.com"
              onLogout={()=>setAuthed(false)} />
      <div className="py-2">
        {route==="/"          && <HomePage onNav={setRoute} />}
        {route==="/analytics" && <ContactsPage f={f} set={setF} />}
        {route==="/contacts"  && <ContactsDetailPage f={f} set={setF} />}
        {route==="/debug"     && (
          <div className="container-fluid px-4">
            <h4 className="my-3 brand-title">Debug</h4>
            <div className="card shadow-sm border-0"><div className="card-body">
              <p className="text-muted small mb-0">
                Internal diagnostics page — query cache status, environment, and
                connection checks. Omitted from this kit.
              </p>
            </div></div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#FFFFFF"/>
    <rect x="0" y="0" width="100" height="22" fill="#C1272D"/>
    <rect x="18" y="40" width="20" height="20" rx="3" fill="#C1272D"/>
    <rect x="40" y="40" width="20" height="20" rx="3" fill="#2A313C"/>
    <rect x="62" y="40" width="20" height="20" rx="3" fill="#75859E"/>
    <rect x="18" y="68" width="64" height="6" rx="3" fill="#2A313C"/>
    <rect x="18" y="78" width="44" height="6" rx="3" fill="#E1E5EA"/>
  </svg>
</template>
</body>
</html>
